<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Workplace English Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --ink:#0D1520;
  --ink2:#131E2D;
  --ink3:#1A2840;
  --line:rgba(255,255,255,0.08);
  --amber:#FFC443;
  --amber2:#FF9D00;
  --teal:#2EECC6;
  --teal2:#0FB8A0;
  --coral:#FF5C5C;
  --rose:#FF7EB3;
  --violet:#A78BFF;
  --sky:#5EC4FF;
  --green:#4ADE80;
  --text:#E8EEF7;
  --text2:#9BADC0;
  --text3:#5F7390;
  --font:'Space Grotesk', sans-serif;
  --body:'Plus Jakarta Sans', sans-serif;
  --mono:'JetBrains Mono', monospace;
  --rad:14px;
  --rad-sm:9px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth; font-size:16px;}
body{background:var(--ink); color:var(--text); font-family:var(--body); -webkit-font-smoothing:antialiased; overflow-x:hidden;}
button{font-family:var(--font); cursor:pointer;}
input,textarea{font-family:var(--body);}
::selection{background:var(--amber); color:#000;}
:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}
*::-webkit-scrollbar{width:4px; height:4px;}
*::-webkit-scrollbar-track{background:transparent;}
*::-webkit-scrollbar-thumb{background:var(--line); border-radius:9px;}

/* ======== TOP BAR ======== */
#topbar{
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(13,21,32,0.95); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
}
.tb-main{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:10px 16px;}
.logo{font-family:var(--font);font-weight:700;font-size:1rem;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-size:14px;}
.tb-stats{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0;}
.stat-chip{font-family:var(--mono);font-size:0.7rem;color:var(--text2);background:var(--ink3);border:1px solid var(--line);padding:4px 10px;border-radius:20px;white-space:nowrap;}
.stat-chip b{color:var(--amber);}
.stat-chip.streak b{color:var(--coral);}

/* ======== BOTTOM NAV (mobile) ======== */
#bottomNav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(13,21,32,0.97);border-top:1px solid var(--line);
  display:flex;overflow-x:auto;scrollbar-width:none;padding:6px 4px;gap:2px;
}
#bottomNav::-webkit-scrollbar{display:none;}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px;
  padding:5px 6px;border-radius:10px;border:none;background:transparent;color:var(--text3);
  font-size:0.58rem;font-weight:600;letter-spacing:0.02em;text-transform:uppercase;transition:all .15s;white-space:nowrap;
}
.bnav-btn .icon{font-size:18px;line-height:1;}
.bnav-btn.active{background:rgba(255,196,67,0.12);color:var(--amber);}

/* ======== MAIN LAYOUT ======== */
#wrap{max-width:1100px;margin:0 auto;padding:70px 12px 90px;}

/* ======== SECTION HEADER ======== */
.sh{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.sh h2{font-family:var(--font);font-size:1.5rem;font-weight:700;}
.sh .sub{color:var(--text2);font-size:0.85rem;margin-top:2px;}

/* ======== LEVEL CHIPS ======== */
.level-row{display:flex;gap:6px;}
.lv-btn{font-size:0.78rem;padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--text2);font-weight:600;transition:all .15s;}
.lv-btn.active{background:var(--teal);color:#000;border-color:var(--teal);}

/* ======== PANEL ======== */
.panel{display:none;}
.panel.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ======== CARD ======== */
.card{background:var(--ink2);border:1px solid var(--line);border-radius:var(--rad);padding:20px;margin-bottom:14px;}
.card.highlight{border-color:rgba(255,196,67,0.3);}
.tag{font-family:var(--mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber);margin-bottom:8px;display:block;}
.tag.teal{color:var(--teal);}
.tag.violet{color:var(--violet);}
.tag.rose{color:var(--rose);}
.tag.coral{color:var(--coral);}

/* ======== BUTTONS ======== */
.btn{font-family:var(--font);font-weight:600;font-size:0.82rem;padding:9px 16px;border-radius:var(--rad-sm);border:1px solid transparent;cursor:pointer;transition:transform .12s,opacity .12s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn.amber{background:var(--amber);color:#000;border-color:var(--amber);}
.btn.teal{background:var(--teal);color:#000;}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--text);}
.btn.ghost:hover{border-color:var(--text2);}
.btn.rose{background:var(--rose);color:#000;}
.btn.violet{background:var(--violet);color:#000;}
.btn.coral{background:var(--coral);color:#fff;}
.btn.sky{background:var(--sky);color:#000;}
.btn.green{background:var(--green);color:#000;}
.btn.sm{font-size:0.72rem;padding:5px 10px;}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center;}

/* ======== INPUTS ======== */
input[type=text],textarea{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--text);border-radius:var(--rad-sm);padding:11px 14px;font-size:0.95rem;transition:border-color .15s;}
input[type=text]:focus,textarea:focus{border-color:var(--teal);outline:none;}
textarea{resize:vertical;min-height:90px;}

/* ======== FEEDBACK ======== */
.fb{margin-top:12px;padding:12px 16px;border-radius:var(--rad-sm);font-size:0.85rem;line-height:1.6;display:none;font-family:var(--body);}
.fb.show{display:block;}
.fb.good{background:rgba(74,222,128,0.1);border:1px solid var(--green);color:var(--green);}
.fb.bad{background:rgba(255,92,92,0.1);border:1px solid var(--coral);color:var(--coral);}
.fb.neutral{background:var(--ink3);border:1px solid var(--line);color:var(--text2);}
.fb.info{background:rgba(94,196,255,0.08);border:1px solid var(--sky);color:var(--sky);}

/* ======== QUIZ OPTS ======== */
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.quiz-opt{
  border:1px solid var(--line);border-radius:var(--rad-sm);padding:11px 14px;cursor:pointer;
  font-size:0.9rem;transition:all .15s;text-align:left;background:transparent;color:var(--text);
  display:flex;align-items:center;gap:10px;
}
.quiz-opt:hover{border-color:var(--teal);background:rgba(46,236,198,0.05);}
.quiz-opt.correct{border-color:var(--green);background:rgba(74,222,128,0.1);color:var(--green);}
.quiz-opt.wrong{border-color:var(--coral);background:rgba(255,92,92,0.08);color:var(--coral);}
.opt-letter{width:24px;height:24px;border-radius:6px;background:var(--ink3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.7rem;flex-shrink:0;}

/* ======== PASSAGE ======== */
.passage{
  background:#141F30;border:1px solid var(--line);border-radius:var(--rad-sm);
  padding:18px;font-size:1rem;line-height:1.8;color:var(--text);margin:12px 0;
}
.blank{
  display:inline-block;min-width:70px;border-bottom:2px dashed var(--amber2);
  text-align:center;color:var(--amber);cursor:pointer;padding:0 4px;font-weight:600;
}

/* ======== PROGRESS BAR ======== */
.prog-bar{height:5px;border-radius:3px;background:var(--ink3);overflow:hidden;margin-top:10px;}
.prog-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:3px;transition:width .5s ease;}

/* ======== BADGE / POINTS POP ======== */
#pointsPop{
  position:fixed;top:70px;right:16px;z-index:200;
  background:var(--amber);color:#000;font-family:var(--font);font-weight:700;
  padding:10px 18px;border-radius:40px;font-size:0.95rem;
  transform:translateY(-20px);opacity:0;transition:all .3s;pointer-events:none;
}
#pointsPop.show{transform:translateY(0);opacity:1;}

/* ======== FLASHCARD ======== */
.flashcard-scene{perspective:900px;width:100%;max-width:380px;height:200px;margin:0 auto 14px;}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer;}
.flashcard-inner.flipped{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rad);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.fc-front{background:linear-gradient(135deg,#1E3250,#0D1D30);border:1px solid rgba(46,236,198,0.2);}
.fc-back{background:linear-gradient(135deg,#2A1E40,#1A0D30);border:1px solid rgba(167,139,255,0.2);transform:rotateY(180deg);}
.fc-word{font-family:var(--font);font-size:1.6rem;font-weight:700;color:var(--teal);}
.fc-pos{font-family:var(--mono);font-size:0.65rem;color:var(--text3);margin-top:6px;}
.fc-hint{font-size:0.75rem;color:var(--text3);margin-top:10px;}
.fc-meaning{font-size:1rem;color:var(--text);font-weight:600;}
.fc-example{font-size:0.82rem;color:var(--text2);font-style:italic;margin-top:8px;line-height:1.5;}

/* ======== GRID LAYOUTS ======== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:700px){.two-col,.three-col{grid-template-columns:1fr;}}
.gram-split{display:grid;grid-template-columns:220px 1fr;gap:16px;}
@media(max-width:750px){.gram-split{grid-template-columns:1fr;}}

/* ======== WORD MATCH GAME ======== */
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;margin:0 auto;}
.match-tile{
  border:1px solid var(--line);border-radius:var(--rad-sm);padding:11px 14px;text-align:center;
  cursor:pointer;font-size:0.9rem;transition:all .2s;background:var(--ink3);
}
.match-tile:hover{border-color:var(--teal);}
.match-tile.selected{border-color:var(--amber);background:rgba(255,196,67,0.1);color:var(--amber);}
.match-tile.matched{border-color:var(--green);background:rgba(74,222,128,0.12);color:var(--green);cursor:default;}
.match-tile.wrong-flash{border-color:var(--coral);background:rgba(255,92,92,0.12);animation:wrongFlash .3s;}
@keyframes wrongFlash{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}};

/* ======== WORD SCRAMBLE ======== */
.scramble-letters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:14px 0;}
.scram-letter{
  width:38px;height:38px;border-radius:8px;background:var(--ink3);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:var(--font);font-weight:700;
  font-size:1.1rem;cursor:pointer;transition:all .15s;user-select:none;
}
.scram-letter:hover{border-color:var(--amber);background:rgba(255,196,67,0.1);}
.scram-letter.picked{opacity:0.3;cursor:default;}
.answer-slots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.answer-slot{
  width:38px;height:38px;border-radius:8px;background:transparent;border:2px dashed var(--line);
  display:flex;align-items:center;justify-content:center;font-family:var(--font);font-weight:700;
  font-size:1.1rem;cursor:pointer;transition:all .15s;
}
.answer-slot.filled{border-color:var(--teal);background:rgba(46,236,198,0.1);color:var(--teal);}

/* ======== TYPING SPEED CHALLENGE ======== */
.type-display{
  background:#141F30;border:1px solid var(--line);border-radius:var(--rad-sm);
  padding:18px;font-size:1.05rem;line-height:1.9;letter-spacing:0.01em;margin:12px 0;
}
.type-char.correct{color:var(--green);}
.type-char.wrong{color:var(--coral);text-decoration:underline;}
.type-char.current{border-bottom:2px solid var(--amber);animation:blink .7s infinite;}
@keyframes blink{50%{border-bottom-color:transparent;}}
.type-char.pending{color:var(--text3);}

/* ======== ROLEPLAY ======== */
.chat-bubble{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;}
.chat-bubble.me{flex-direction:row-reverse;}
.bubble-ava{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.bubble-ava.other{background:var(--ink3);}
.bubble-ava.me{background:rgba(255,196,67,0.2);}
.bubble-txt{
  max-width:80%;background:var(--ink3);border-radius:12px;padding:10px 14px;
  font-size:0.9rem;line-height:1.5;
}
.bubble-txt.me{background:rgba(255,196,67,0.1);border:1px solid rgba(255,196,67,0.2);}
.bubble-who{font-family:var(--mono);font-size:0.6rem;color:var(--text3);margin-bottom:3px;}

/* ======== PRONUNCIATION MIC ======== */
.pron-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--ink3);border-radius:var(--rad-sm);margin-bottom:8px;}
.pron-word{font-family:var(--font);font-weight:700;font-size:1rem;min-width:130px;}
.pron-ipa{font-family:var(--mono);font-size:0.75rem;color:var(--teal);min-width:90px;}
.pron-note{font-size:0.8rem;color:var(--text2);flex:1;}

/* ======== EMOJI REACTION ======== */
.emoji-react{font-size:2rem;text-align:center;margin:8px 0;animation:popIn .4s cubic-bezier(.36,1.6,.54,1);}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}

/* ======== STREAK FLAME ======== */
.streak-anim{display:inline-block;animation:flame 1.2s ease-in-out infinite alternate;}
@keyframes flame{from{transform:scale(1) rotate(-2deg);}to{transform:scale(1.15) rotate(2deg);}}

/* ======== SCENARIO CHIPS ======== */
.chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.chip{font-size:0.78rem;padding:6px 13px;border-radius:20px;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--text2);font-weight:600;white-space:nowrap;transition:all .15s;}
.chip.active{background:var(--violet);color:#fff;border-color:var(--violet);}

/* ======== TRUTH / LIE ======== */
.tl-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:600px){.tl-cards{grid-template-columns:1fr;}}
.tl-card{border:1px solid var(--line);border-radius:var(--rad-sm);padding:16px;cursor:pointer;transition:all .15s;text-align:center;font-size:0.9rem;line-height:1.5;}
.tl-card:hover{border-color:var(--amber);}
.tl-card.truth-revealed{border-color:var(--green);background:rgba(74,222,128,0.08);}
.tl-card.lie-revealed{border-color:var(--coral);background:rgba(255,92,92,0.08);}

/* ======== STORY BUILDER ======== */
.story-words{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0;}
.story-word{font-size:0.82rem;padding:5px 10px;border-radius:20px;background:var(--ink3);border:1px solid var(--teal);color:var(--teal);cursor:pointer;font-weight:600;transition:all .15s;}
.story-word:hover{background:rgba(46,236,198,0.15);}
.story-word.used{opacity:0.35;cursor:default;}
.story-output{min-height:60px;background:var(--ink);border:1px solid var(--line);border-radius:var(--rad-sm);padding:12px;font-size:0.95rem;line-height:1.6;}

/* ======== IDIOM CARD FLIP ======== */
.idiom-flip-scene{perspective:700px;height:120px;cursor:pointer;margin-bottom:10px;}
.idiom-flip-inner{position:relative;height:100%;transition:transform .45s;transform-style:preserve-3d;}
.idiom-flip-inner.flipped{transform:rotateY(180deg);}
.idiom-front,.idiom-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rad-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;text-align:center;}
.idiom-front{background:var(--ink3);border:1px solid var(--line);}
.idiom-back{background:rgba(46,236,198,0.06);border:1px solid rgba(46,236,198,0.3);transform:rotateY(180deg);}

/* ======== EMAIL BUILDER ======== */
.email-part{margin-bottom:12px;}
.email-part label{font-family:var(--mono);font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;}
.email-options{display:flex;gap:6px;flex-wrap:wrap;}
.email-opt{font-size:0.82rem;padding:6px 12px;border-radius:20px;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;}
.email-opt:hover{border-color:var(--sky);}
.email-opt.selected{background:rgba(94,196,255,0.1);border-color:var(--sky);color:var(--sky);}
.email-preview{background:#141F30;border:1px solid var(--line);border-radius:var(--rad-sm);padding:16px;font-size:0.9rem;line-height:1.7;min-height:120px;white-space:pre-line;color:var(--text);}

/* ======== SPEAKING meter ======== */
.mic-ring{
  width:64px;height:64px;border-radius:50%;border:3px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  transition:all .3s;cursor:pointer;
}
.mic-ring.listening{border-color:var(--coral);background:rgba(255,92,92,0.1);animation:micPulse 1s infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,92,92,0.4);}50%{box-shadow:0 0 0 12px rgba(255,92,92,0);}}

/* ======== COMPREHENSION TIMER ======== */
.timer-ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
.timer-ring-wrap svg{transform:rotate(-90deg);}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.75rem;font-weight:600;color:var(--amber);}

/* ======== GRAMMAR LIST ======== */
.gram-topic{text-align:left;border:1px solid var(--line);background:var(--ink3);color:var(--text2);padding:10px 13px;border-radius:var(--rad-sm);cursor:pointer;font-size:0.85rem;width:100%;transition:all .15s;display:block;margin-bottom:6px;}
.gram-topic.active{border-color:var(--amber);color:var(--text);}
.gram-topic .sc{font-family:var(--mono);font-size:0.6rem;color:var(--teal);display:block;margin-top:3px;}

/* ======== ACCENT TIPS ======== */
.accent-tip{background:rgba(255,126,179,0.06);border-left:3px solid var(--rose);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:0.85rem;color:var(--text);}
.accent-tip strong{color:var(--rose);}
.info-tip{background:rgba(255,196,67,0.06);border-left:3px solid var(--amber);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:0.85rem;color:var(--text);}
.info-tip strong{color:var(--amber);}

/* ======== DASHBOARD ======== */
.hero-dash{text-align:center;padding:28px 16px 36px;}
.hero-dash h1{font-family:var(--font);font-size:clamp(1.6rem,5vw,2.6rem);font-weight:700;line-height:1.15;margin-bottom:12px;}
.hero-dash h1 em{color:var(--amber);font-style:normal;}
.hero-dash .lead{color:var(--text2);font-size:0.95rem;max-width:520px;margin:0 auto 22px;line-height:1.65;}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.mod-tile{
  border:1px solid var(--line);border-radius:var(--rad);padding:18px 14px;
  cursor:pointer;transition:all .2s;background:var(--ink2);text-align:center;
}
.mod-tile:hover{border-color:var(--amber);transform:translateY(-2px);}
.mod-tile .mi{font-size:28px;margin-bottom:8px;}
.mod-tile h3{font-family:var(--font);font-size:0.9rem;font-weight:700;margin-bottom:4px;}
.mod-tile p{color:var(--text3);font-size:0.72rem;line-height:1.4;}
.xp-bar{height:6px;border-radius:3px;background:var(--ink3);overflow:hidden;margin-top:10px;}
.xp-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),var(--amber2));border-radius:3px;}

.daily-goals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:500px){.daily-goals{grid-template-columns:1fr 1fr;}}
.goal-card{background:var(--ink2);border:1px solid var(--line);border-radius:var(--rad-sm);padding:14px;text-align:center;}
.goal-card .goal-n{font-family:var(--font);font-size:1.5rem;font-weight:700;color:var(--teal);}
.goal-card .goal-n.done{color:var(--amber);}

<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-main">
    <div class="logo"><div class="logo-icon">🏢</div>WorkEnglish Lab</div>
    <div class="tb-stats">
      <div class="stat-chip streak"><span class="streak-anim">🔥</span> <b id="statStreak">0</b>d</div>

      <div class="stat-chip" id="voiceChip" style="cursor:pointer" title="Toggle voice">🎤 <b id="voiceLabel">♀</b></div>
    </div>
  </div>
</div>

<!-- POINTS POP -->
<div id="pointsPop">+0 pts 🎉</div>

<!-- MAIN CONTENT -->
<div id="wrap">
  <!-- panels will be injected here -->
</div>

<!-- BOTTOM NAV -->
<div id="bottomNav">
  <button class="bnav-btn active" data-tab="dash"><span class="icon">🏠</span>Home</button>
  <button class="bnav-btn" data-tab="listen"><span class="icon">🎧</span>Listen</button>
  <button class="bnav-btn" data-tab="speak"><span class="icon">🎤</span>Speak</button>
  <button class="bnav-btn" data-tab="read"><span class="icon">📖</span>Read</button>
  <button class="bnav-btn" data-tab="write"><span class="icon">✍️</span>Write</button>
  <button class="bnav-btn" data-tab="vocab"><span class="icon">💬</span>Vocab</button>
  <button class="bnav-btn" data-tab="grammar"><span class="icon">📐</span>Grammar</button>
  <button class="bnav-btn" data-tab="games"><span class="icon">🎮</span>Games</button>
  <button class="bnav-btn" data-tab="speak2"><span class="icon">🧑‍💼</span>Interview</button>

  <button class="bnav-btn" data-tab="roleplay"><span class="icon">🎭</span>Roleplay</button>
</div>

<script>
/* ============================================================
   STATE & STORAGE
============================================================ */
const SK = "wel3-state";
let S = {
  tab:"dash", level:"Beginner", voiceGender:"girl",
  pts:0, streak:0, lastDate:null,
  done:{}, // key:true
  vocabKnown:{},
  gramTopic:"tense",
  flashDeck:"Meetings", flashIdx:0,
  scenarioId:"meeting",
  matchState:null,
  scrambleState:null,
  typeState:null,
  emailState:{greeting:null,body:null,close:null},
  storyWords:[],
  idiomFlips:{},
  fillStates:{},
  interviewIdx:0,
};

async function loadState(){
  try{
    const r = await window.storage.get(SK);
    if(r&&r.value){ const d=JSON.parse(r.value); Object.assign(S,d); }
  }catch(e){}
  checkStreak();
  render();
}
async function save(){
  try{ await window.storage.set(SK, JSON.stringify(S)); }catch(e){}
}
function today(){ return new Date().toISOString().slice(0,10); }
function checkStreak(){
  const t=today();
  if(S.lastDate===t) return;
  const last=S.lastDate?new Date(S.lastDate):null;
  const now=new Date(t);
  if(last){ const d=Math.round((now-last)/86400000); S.streak=d===1?S.streak+1:1; }
  else S.streak=1;
  S.lastDate=t; save();
}
function addPts(n, label=""){
  S.pts+=n; save();
  const pop=document.getElementById("pointsPop");
  pop.textContent=`+${n} pts ${n>=15?"🎉":n>=10?"✨":""}`;
  pop.classList.add("show");
  setTimeout(()=>pop.classList.remove("show"),1800);
  document.getElementById("statPts").textContent=S.pts;
}
function markDone(key,pts=10){
  if(!S.done[key]){ S.done[key]=true; addPts(pts); save(); }
}

/* ============================================================
   VOICE
============================================================ */
let voiceGender="girl";
function speak(text, rate=0.88){
  if(!window.speechSynthesis){ return; }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate;
  const vv=window.speechSynthesis.getVoices();
  if(voiceGender==="girl"){
    u.voice=vv.find(v=>/en-IN/i.test(v.lang)&&/female|heera|raveena/i.test(v.name))
      ||vv.find(v=>/en-IN/i.test(v.lang))
      ||vv.find(v=>/en/i.test(v.lang)&&/female|samantha|karen|moira|zira/i.test(v.name))
      ||vv.find(v=>/en/i.test(v.lang))||null;
    u.pitch=1.1; u.lang="en-IN";
  } else {
    u.voice=vv.find(v=>/en/i.test(v.lang)&&/male|daniel|david|mark/i.test(v.name))||null;
    u.pitch=0.85; u.lang="en-US";
  }
  window.speechSynthesis.speak(u);
}
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>{};

/* ============================================================
   NAVIGATION
============================================================ */
function render(){
  document.getElementById("statStreak").textContent=S.streak;
  document.getElementById("statPts").textContent=S.pts;
  document.getElementById("voiceLabel").textContent=voiceGender==="girl"?"♀":"♂";
  document.querySelectorAll(".bnav-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===S.tab));
  const wrap=document.getElementById("wrap");
  wrap.innerHTML=`<div class="panel active" id="root"></div>`;
  const root=document.getElementById("root");
  const fn={
    dash:dashPanel, listen:listenPanel, speak:speakPanel,
    read:readPanel, write:writePanel, vocab:vocabPanel,
    grammar:grammarPanel, games:gamesPanel, speak2:interviewPanel,
    pron:pronPanel, roleplay:roleplayPanel
  };
  if(fn[S.tab]) root.innerHTML=fn[S.tab]();
  bind();
}
function goTab(t){ S.tab=t; render(); window.scrollTo({top:0,behavior:"smooth"}); }

/* ============================================================
   LEVEL SELECTOR HTML
============================================================ */
const LEVELS=["Beginner","Intermediate","Advanced"];
function lvHTML(){
  return `<div class="level-row">${LEVELS.map(l=>`<button class="lv-btn ${S.level===l?"active":""}" data-lv="${l}">${l}</button>`).join("")}</div>`;
}

/* ============================================================
   GENERATOR ENGINE — unlimited, ever-fresh activities
   Pure client-side, no network/API needed. Combines word banks +
   sentence templates into new combinations every time, seeded by
   day so the set rotates automatically, plus an instant "New set"
   shuffle for on-demand variety.
============================================================ */

// Seeded RNG so "today's set" is stable across reloads but different each day
function seededRng(seed){
  let s=seed%2147483647; if(s<=0) s+=2147483646;
  return function(){ s=(s*16807)%2147483647; return (s-1)/2147483646; };
}
function dayCode(){ return Number(new Date().toISOString().slice(0,10).replace(/-/g,"")); }
function strSeed(str){ let h=0; for(let i=0;i<str.length;i++){ h=((h<<5)-h+str.charCodeAt(i))|0; } return Math.abs(h)||1; }
// rng scoped to a "bucket" (module+level) + day, OR a manual shuffle nonce for instant variety
function bucketRng(bucket){
  const nonce=S.shuffleNonce&&S.shuffleNonce[bucket]||0;
  return seededRng(strSeed(bucket+":"+dayCode()+":"+nonce));
}
function pick(rng,arr){ return arr[Math.floor(rng()*arr.length)]; }
function pickN(rng,arr,n){
  const pool=[...arr]; const out=[];
  n=Math.min(n,pool.length);
  for(let i=0;i<n;i++){ const idx=Math.floor(rng()*pool.length); out.push(pool.splice(idx,1)[0]); }
  return out;
}
function shuffled(rng,arr){ return pickN(rng,arr,arr.length); }
function reshuffle(bucket){
  S.shuffleNonce=S.shuffleNonce||{};
  S.shuffleNonce[bucket]=(S.shuffleNonce[bucket]||0)+1;
  save(); render();
}
function refreshBtn(bucket,label="🎲 New set"){
  return `<button class="btn ghost sm" onclick="reshuffle('${bucket}')" title="Generate a fresh set instantly — never the same twice">${label}</button>`;
}
function contentKey(prefix,text){ return `${prefix}-${strSeed(String(text)).toString(36)}`; }

/* ---------- WORD BANKS used across generators ---------- */
const WB={
  names:["Priya","Rohan","Ananya","Vikram","Kavya","Arjun","Meera","Suresh","Divya","Nikhil","Pooja","Rahul","Shreya","Anand","Ritu","Sanjay","Neha","Karan","Tanya","Vivek"],
  depts:["Sales","Marketing","Finance","Operations","HR","Product","Engineering","Customer Success","Legal","Procurement"],
  deliverables:["the client report","the budget proposal","the onboarding deck","the project timeline","the audit summary","the campaign brief","the vendor contract","the quarterly review","the test plan","the design mockups","the pricing sheet","the training module"],
  timeframes:["by end of day","by Friday","within two days","before the client call","by next Monday","before the sprint ends","within the hour","by the end of the week"],
  meetingTypes:["a stand-up","a client call","a planning session","a one-on-one","a retrospective","a board review","a kickoff meeting","a status update"],
  problems:["a vendor delay","a missing approval","a scope change","a staffing gap","a budget overrun","a tooling outage","a miscommunication with the client","a delayed shipment"],
  emotions_soft:["I completely understand","I hear you on this","That's a fair concern","I appreciate you flagging this"],
  business_verbs:["finalise","review","escalate","align on","circle back on","prioritise","validate","streamline","document","delegate"],
  outcomes:["improved efficiency by 18%","cut turnaround time in half","reduced errors significantly","increased client satisfaction","saved roughly 10 hours a week","prevented a major delay"],
};

/* ---------- SENTENCE TEMPLATE GENERATORS ---------- */
// Speaking phrases — unlimited via slot-filling
const SPEAK_TEMPLATES={
  Beginner:[
    n=>`Good morning! Could you help me find ${pick(n,["the meeting room","the HR desk","the cafeteria","conference room "+pick(n,["A","B","C"])])}?`,
    n=>`I will send you ${pick(n,WB.deliverables)} ${pick(n,WB.timeframes)}.`,
    n=>`Nice to meet you. I'm from the ${pick(n,WB.depts)} team.`,
    n=>`Sorry, could you repeat that more slowly please?`,
    n=>`Could you tell me what time ${pick(n,WB.meetingTypes)} starts today?`,
    n=>`Thank you for waiting — I'll be right with you.`,
    n=>`Is it okay if I join ${pick(n,WB.meetingTypes)} five minutes late?`,
    n=>`I just wanted to check in about ${pick(n,WB.deliverables)}.`,
  ],
  Intermediate:[
    n=>`I see your point, but I have a slightly different take on ${pick(n,WB.deliverables)}.`,
    n=>`Could we schedule a quick call to align on ${pick(n,WB.deliverables)}?`,
    n=>`I'm afraid I won't be able to make ${pick(n,WB.meetingTypes)} this week.`,
    n=>`We're currently dealing with ${pick(n,WB.problems)}, so the timeline may shift slightly.`,
    n=>`Could you ${pick(n,WB.business_verbs)} ${pick(n,WB.deliverables)} ${pick(n,WB.timeframes)}?`,
    n=>`${pick(n,WB.emotions_soft)} — let's find a way forward together.`,
    n=>`I'd like to walk you through where things stand on ${pick(n,WB.deliverables)}.`,
  ],
  Advanced:[
    n=>`With respect, I'd push back on the assumption behind ${pick(n,WB.deliverables)}.`,
    n=>`Let me level with you — the timeline for ${pick(n,WB.deliverables)} isn't realistic as it stands.`,
    n=>`I'd like to circle back once we have the data to support ${pick(n,WB.deliverables)}.`,
    n=>`Given ${pick(n,WB.problems)}, I think we need to revisit our approach entirely.`,
    n=>`We've ${pick(n,WB.outcomes)} this quarter, and I'd like to build on that momentum.`,
    n=>`I want to be transparent — ${pick(n,WB.problems)} is going to affect our delivery date.`,
  ],
};
const SPEAK_TIPS=["Keep your voice up at the end if it's a question.","Stress the most important word in the sentence, not every word equally.","Pause briefly before the key point — it adds weight.","Smile slightly while speaking; it softens your tone naturally.","Slow down on numbers and names so they land clearly.","Drop your pitch slightly at the end of a statement to sound confident."];
const SPEAK_ACCENT_NOTES=["Connected speech: nearby words often blend together — don't pronounce each one separately.","Watch word stress — many Indian English speakers stress the wrong syllable in longer words.","Reduce filler words like 'actually' and 'basically' in formal contexts.","Final consonants should be light, not dropped entirely.","'Th' sounds should use the tongue between the teeth, not a hard 'd' or 't'.","Avoid translating Indian-English-only phrases like 'revert' or 'do the needful' for global audiences."];

function genSpeakSet(level,count=6){
  const rng=bucketRng("speak-"+level);
  const templates=shuffled(rng,SPEAK_TEMPLATES[level]);
  return Array.from({length:count},(_,i)=>{
    const tFn=templates[i%templates.length];
    return {lv:level,ph:tFn(rng),tip:pick(rng,SPEAK_TIPS),acc:pick(rng,SPEAK_ACCENT_NOTES)};
  });
}

// Fill-in-the-blank — unlimited via verb/phrase bank slotting
const FILL_BANK={
  Beginner:[
    {sentence:"Please ______ the report by end of day.",word:"send",options:["send","sent","sending"]},
    {sentence:"I am calling ______ the account manager.",word:"for",options:["for","about","from"]},
    {sentence:"Could you please ______ that again?",word:"repeat",options:["repeat","repeated","repeating"]},
    {sentence:"She ______ to the meeting room now.",word:"is heading",options:["is heading","heads","headed"]},
    {sentence:"We ______ the new joiner on Monday.",word:"will welcome",options:["will welcome","welcomed","welcoming"]},
    {sentence:"Can you ______ me the file?",word:"send",options:["send","sending","sent"]},
  ],
  Intermediate:[
    {sentence:"I'll ______ on this and get back to you by Friday.",word:"follow up",options:["follow up","pick up","catch up"]},
    {sentence:"We need to ______ the launch by two weeks due to testing.",word:"push back",options:["push back","pull forward","move up"]},
    {sentence:"Could you ______ the legal team on this email?",word:"loop in",options:["loop in","bring in","let in"]},
    {sentence:"Let's ______ before making a final decision.",word:"touch base",options:["touch base","touch down","touch up"]},
    {sentence:"I want to ______ a potential risk in this plan.",word:"flag",options:["flag","mark","note"]},
    {sentence:"This issue needs to be ______ to senior management.",word:"escalated",options:["escalated","elevated","raised up"]},
  ],
  Advanced:[
    {sentence:"Our strategy has ______ our cost base significantly.",word:"optimised",options:["optimised","affected","restructured"]},
    {sentence:"We should ______ before making any assumptions about the data.",word:"validate",options:["validate","check","verify"]},
    {sentence:"The board wants us to ______ our market position before Q4.",word:"consolidate",options:["consolidate","combine","merge"]},
    {sentence:"With respect, I'd like to ______ that assumption.",word:"challenge",options:["challenge","fight","attack"]},
    {sentence:"We need to ______ the risks before committing to this timeline.",word:"quantify",options:["quantify","count","number"]},
  ],
};
function genFillSet(level,count=4){
  const rng=bucketRng("fill-"+level);
  return pickN(rng,FILL_BANK[level],Math.min(count,FILL_BANK[level].length));
}

// Typing challenge sentences — unlimited via template slotting
const TYPE_TEMPLATES={
  Beginner:[n=>`Please send me ${pick(n,WB.deliverables)} when you are ready.`,n=>`The meeting is scheduled for Monday at ten AM.`,n=>`I will be in the office ${pick(n,WB.timeframes)}.`],
  Intermediate:[n=>`I appreciate your feedback and will incorporate it into the final version.`,n=>`Could you please loop in the design team on this thread?`,n=>`We are currently dealing with ${pick(n,WB.problems)}.`],
  Advanced:[n=>`Our quarterly results reflect the strategic investments we have made in operational efficiency.`,n=>`With respect, I would push back on that assumption pending further data.`,n=>`Given the current constraints, I'd recommend we revisit the rollout plan together.`],
};
function genTypeSet(level,count=5){
  const rng=bucketRng("type-"+level);
  return Array.from({length:count},()=>({lv:level,text:pick(rng,TYPE_TEMPLATES[level])(rng)}));
}

/* ============================================================
   DATA
============================================================ */
const LISTEN=[
  {lv:"Beginner",title:"Morning briefing",audio:"Good morning everyone. Today we have three main goals: complete the client review, send the weekly report, and attend the product demo at three PM. Please make sure you are on time.",blanks:["review","report","demo","time"],q:[{q:"How many goals are there today?",opts:["Two","Three","Four"],a:1},{q:"What time is the product demo?",opts:["Two PM","Three PM","Four PM"],a:1}]},
  {lv:"Beginner",title:"A voicemail",audio:"Hi, this is Amit calling from HR. I wanted to let you know that your orientation will be on Monday at nine AM in conference room B. Please bring a photo ID and your joining documents.",blanks:["orientation","Monday","conference","documents"],q:[{q:"Who is calling?",opts:["A manager","HR","A client"],a:1},{q:"What should you bring?",opts:["Laptop only","Photo ID and joining documents","Only documents"],a:1}]},
  {lv:"Beginner",title:"Office rules",audio:"Please remember that the pantry closes at six PM. All visitors must sign in at the front desk. Mobile phones should be on silent during meetings. The Wi-Fi password is posted on the notice board.",blanks:["pantry","visitors","silent","notice"],q:[{q:"When does the pantry close?",opts:["Five PM","Six PM","Seven PM"],a:1},{q:"Where is the Wi-Fi password?",opts:["In an email","On the notice board","With the receptionist"],a:0}]},

  {lv:"Intermediate",title:"Performance review",audio:"Your targets for this quarter were met in three out of four areas. Your client satisfaction scores improved significantly, which is fantastic. However, we would like to see stronger ownership of documentation going forward. I will share detailed written feedback by Friday.",blanks:["targets","satisfaction","documentation","feedback"],q:[{q:"How many areas were targets met in?",opts:["Two","Three","Four"],a:1},{q:"What needs improvement?",opts:["Client communication","Documentation ownership","Sales targets"],a:1}]},

const SPEAK=[
  {lv:"Beginner",ph:"Good morning! Could you help me find the meeting room?",tip:"Keep your voice up at the end — it's a polite question.",acc:"'Could you' sounds like 'kud-joo' when spoken naturally. Don't say each word separately."},
  {lv:"Beginner",ph:"I will send you the report by end of day.",tip:"Stress 'send' and 'report' — these carry the most meaning.",acc:"'End of day' is often said as 'end-uh-day' in connected speech. Practice until it flows."},
  {lv:"Beginner",ph:"Nice to meet you. I'm from the marketing team.",tip:"Smile while you speak — it softens your tone naturally.",acc:"'Marketing' — stress the first syllable: MAR-ke-ting, not mar-KET-ing."},
  {lv:"Beginner",ph:"Sorry, could you repeat that more slowly please?",tip:"'Slowly please' at the end sounds very polite and natural.",acc:"Many Indian speakers merge 'slowly' into 'slowlee'. Try to enunciate all three syllables: slow-lee."},
  {lv:"Intermediate",ph:"I see your point, but I have a slightly different perspective.",tip:"Pause after 'point' to give the other person a moment.",acc:"'Perspective' is often mispronounced as 'perspectif'. End it with a clear 'v': per-SPEC-tive."},
  {lv:"Intermediate",ph:"Could we schedule a quick call to align on this?",tip:"'Align on this' is natural business language — use it confidently.",acc:"'Schedule' — use SKED-yool for American clients, SHED-yool for British. Both are correct."},

  {lv:"Advanced",ph:"With respect, I'd push back on that assumption.",tip:"'With respect' is polite but firm — say it calmly, not defensively.",acc:"'Assumption' — stress the second syllable: a-SUMP-tion. Indian speakers sometimes stress the first."},
  {lv:"Advanced",ph:"Let me level with you — the timeline isn't realistic as it stands.",tip:"'Level with you' signals honest directness. Pause before saying the real message.",acc:"'Realistic' — four syllables: ree-uh-LIS-tik. The middle is a light 'uh' sound, not 'a'."},

  {lv:"Intermediate",title:"The cost of context switching",text:"Every time you switch between tasks, your brain needs a few minutes to refocus. Frequent interruptions from chat notifications can cost a knowledge worker over an hour of effective focus per day. Blocking quiet time on your calendar is one of the simplest ways to protect deep work.",vocab:[{w:"interruptions",d:"things that stop an activity temporarily"},{w:"refocus",d:"to direct attention back to something"},{w:"deep work",d:"focused, uninterrupted professional work"}],q:[{q:"What causes the biggest loss of focus?",opts:["Long meetings","Frequent interruptions","Working from home"],a:1},{q:"What is suggested to protect focus time?",opts:["Turning off your laptop","Blocking quiet time on the calendar","Working only at night"],a:1}]},

const WRITE=[
  {lv:"Beginner",title:"Write a self-introduction email",prompt:"You just joined a company. Write a short email (3-4 sentences) introducing yourself to the team. Include your name, your role, and one thing you're looking forward to.",checklist:["Friendly greeting","Your name and role","Positive closing"],sample:"Hi everyone,\n\nI'm Priya, joining today as a Business Analyst. I'm excited to be part of such a talented team and look forward to contributing to our upcoming projects.\n\nLooking forward to meeting everyone!\n\nBest,\nPriya"},
  {lv:"Beginner",title:"Confirm a meeting by email",prompt:"Your manager asked if you can join a call tomorrow at 2 PM. Write a short 2-sentence confirmation email.",checklist:["Confirm attendance","Mention the time","Brief and polite"],sample:"Hi Shreya,\n\nThank you for the invite — I'll be on the call tomorrow at 2 PM.\n\nBest,\nRohan"},
  {lv:"Beginner",title:"Leave request email",prompt:"You need to take two days leave next week. Write a short email requesting leave and mentioning the dates.",checklist:["State the request clearly","Mention the dates","Offer to hand over work"],sample:"Hi Anand,\n\nI'd like to request leave on Monday 15th and Tuesday 16th July for a personal matter. I'll ensure all pending work is wrapped up before I leave and will brief Kavya on anything that needs coverage.\n\nThanks,\nVinay"},
  {lv:"Intermediate",title:"Decline a request politely",prompt:"A colleague asks you to take on an extra project this week, but you are at full capacity. Write an email declining politely and suggesting an alternative.",checklist:["Acknowledge the request","Briefly explain your situation","Offer a constructive alternative","Warm closing"],sample:"Hi Ritu,\n\nThanks for thinking of me for this. Unfortunately I'm at full capacity this week with the client deliverable, so I won't be able to take this on right now. Could we revisit this next week, or perhaps Suresh has some bandwidth?\n\nBest,\nDivya"},
  {lv:"Intermediate",title:"Meeting summary email",prompt:"You just had a planning meeting. Write a short follow-up email summarising what was decided and next steps.",checklist:["Thank participants","State key decisions","List next steps with owners","Clear, structured format"],sample:"Hi team,\n\nThanks for a productive session today. Here's a quick summary:\n\nDecisions:\n- Launch date moved to 20th August\n- QA team will run a full regression cycle\n\nNext steps:\n- Nikhil: finalise test plan by Wednesday\n- Pooja: update the client by Friday\n\nThanks all,\nMeera"},
  {lv:"Advanced",title:"Escalation email to leadership",prompt:"A supplier has been unresponsive for 10 days and it's blocking your project. Write a concise escalation email to your VP, explaining the issue, impact, and what you need from them.",checklist:["State the issue in the first line","Quantify the impact","Make a specific ask","Professional, not emotional tone"],sample:"Hi Vikram,\n\nI need to flag a blocking issue: supplier XYZ has been unresponsive for ten days despite three follow-up attempts, and this is now delaying our October launch by an estimated two weeks.\n\nI'd like your support in escalating through the procurement channel or approving an alternative vendor shortlist.\n\nHappy to brief you in a quick call today.\n\nThanks,\nArjun"},
  {lv:"Advanced",title:"Persuasive business case",prompt:"Write a 4-5 sentence memo persuading leadership to invest in a new analytics tool costing $5,000 annually. Make a compelling ROI argument.",checklist:["Lead with the recommendation","Quantify the benefit","Address the cost objection","Clear call to action"],sample:"Recommendation: approve $5,000 annual licence for DataStream analytics.\n\nThe tool will cut manual reporting time from eight hours to under ninety minutes per week — saving approximately 330 staff hours annually, equivalent to roughly $8,200 at current rates. While the upfront cost may seem significant, the payback period is under eight months, and the freed capacity will flow directly into client-facing analysis.\n\nI'd like approval by Friday to onboard ahead of Q4 planning."},
  {lv:"Beginner",title:"Thank-you note after an interview",prompt:"You had a job interview yesterday. Write a short thank-you email (3-4 sentences) to the interviewer.",checklist:["Thank them for their time","Mention one specific topic discussed","Express continued interest"],sample:"Hi Mr. Sharma,\n\nThank you for taking the time to speak with me yesterday about the Business Analyst role. I really enjoyed our discussion on the team's dashboard projects, and it made me even more excited about the opportunity.\n\nLooking forward to hearing from you.\n\nBest,\nKavya"},
  {lv:"Beginner",title:"Asking a colleague for help",prompt:"You're stuck on a spreadsheet formula. Write a short, polite message asking a colleague for help.",checklist:["Polite opener","Clearly state what you need","Respect their time"],sample:"Hi Rahul,\n\nSorry to bother you — would you have five minutes today to help me with a tricky VLOOKUP formula? No rush if you're busy, just let me know what works.\n\nThanks so much,\nNeha"},
  {lv:"Beginner",title:"Welcoming a new team member",prompt:"A new colleague joins your team tomorrow. Write a short welcome message for the team chat.",checklist:["Warm, friendly tone","Introduce what the team does","Offer help"],sample:"Hi everyone, please join me in welcoming Tanya to the team starting tomorrow! She'll be working with us on the reporting pipeline. Feel free to drop by and say hi — always happy to help her settle in. 🎉"},
  {lv:"Intermediate",title:"Requesting a deadline extension",prompt:"You realise you need two extra days to finish a deliverable. Write an email to your manager explaining why and requesting an extension.",checklist:["State the request early","Give a clear, honest reason","Propose a new date","Show ownership"],sample:"Hi Vivek,\n\nI wanted to flag early that I'll need two extra days on the campaign brief — the client sent revised requirements yesterday that changed the scope. I can deliver by Thursday instead of Tuesday, and I'll keep you posted if anything else comes up.\n\nThanks for understanding,\nSanjay"},
  {lv:"Intermediate",title:"Responding to a client complaint",prompt:"A client emails saying they're unhappy with a delayed delivery. Write a calm, professional reply.",checklist:["Acknowledge their frustration","Avoid being defensive","Explain next steps","Offer a way to make it right"],sample:"Hi Mr. Iyer,\n\nI'm sorry to hear about the delay — I completely understand the frustration this has caused. I've looked into it and the shipment was held up at customs; it's now cleared and will arrive by Thursday. As an apology, we'd like to offer a 10% credit on your next order.\n\nThank you for your patience,\nMeera"},
  {lv:"Intermediate",title:"Internal proposal for a process change",prompt:"You think your team's weekly status meeting should move from Monday to Wednesday. Write a short proposal email to your team.",checklist:["State the proposed change","Give the reasoning","Invite feedback","Keep it brief"],sample:"Hi team,\n\nI'd like to propose moving our weekly status meeting from Monday to Wednesday. Mondays tend to be packed with client kickoffs, and a mid-week sync would let us share more concrete updates. Open to thoughts before I update the calendar invite.\n\nThanks,\nArjun"},
  {lv:"Advanced",title:"Delivering difficult news to a client",prompt:"Your company must inform a key client that a major feature will be delayed by a month. Write a 5-6 sentence email that is honest but reassuring.",checklist:["Lead with the headline, don't bury it","Give a brief, honest reason","Show what you're doing about it","End with confidence, not apology overload"],sample:"Hi Ms. Reddy,\n\nI want to flag early that the analytics module will now ship in early November rather than October — we hit an unexpected integration issue with your data warehouse that needs proper testing rather than a rushed fix. We've added two engineers to close the gap and I'll send you a revised timeline by Friday. I know timing matters here, and I want to make sure we get this right rather than fast.\n\nHappy to jump on a call if useful,\nNikhil"},
  {lv:"Advanced",title:"Negotiating scope with a stakeholder",prompt:"A stakeholder wants three extra features added to a project with no extra time or budget. Write an email that pushes back constructively.",checklist:["Acknowledge the request positively","Be specific about the tradeoff","Offer alternatives, not just 'no'","Keep tone collaborative"],sample:"Hi Karan,\n\nThanks for sharing these — all three would genuinely add value. Given our current timeline and budget, though, adding them as-is would push the launch by roughly three weeks. I'd suggest we ship the top priority one now and slot the other two into the next sprint, so we don't put the launch date at risk. Happy to talk through the tradeoffs if that helps.\n\nBest,\nPooja"},
];

const INTERVIEW=[
  {lv:"Beginner",q:"Tell me about yourself.",guide:"Present → Past → Future. Keep it under 90 seconds.",star:null,tips:["Start with your current role","Add 1-2 relevant strengths","End with why you want this role"],sample:"I'm currently a data analyst at a fintech firm, where I've spent the last two years building dashboards for the operations team. Before that, I was in e-commerce analytics. I'm drawn to this role because it combines my love of data with client-facing work, which is where I want to grow."},
  {lv:"Beginner",q:"What is your biggest strength?",guide:"Pick one relevant strength. Give a specific example. Keep it to 30-40 seconds.",star:null,tips:["Choose what the job needs most","Always give proof — not just adjectives","One strength, done well, beats three vague ones"],sample:"My biggest strength is communicating data clearly to non-technical stakeholders. At my current role, I redesigned our weekly business review from a raw numbers dump into a visual summary that leadership could act on — it went from being skimmed to being the highlight of the Monday meeting."},
  {lv:"Intermediate",q:"Tell me about a time you handled a difficult colleague.",guide:"Use STAR: Situation → Task → Action → Result.",star:{S:"Set the scene: where, when, who was involved.",T:"What were YOU responsible for in that moment?",A:"What exactly did you do? Focus on YOUR actions.",R:"What was the outcome? What did you learn?"},tips:["Stay professional — no bad-mouthing","Focus on your behaviour, not theirs","End on a positive or learning note"],sample:"A colleague and I had very different working styles — they preferred to improvise, I relied on structure (S). We were jointly responsible for a client presentation (T). I arranged a 20-minute one-on-one, shared my concern calmly, and we agreed on a hybrid: loose creative sessions early, then a structured review before delivery (A). The presentation went well and our manager used it as a case study (R)."},
  {lv:"Intermediate",q:"Describe a time you failed or made a mistake.",guide:"Show self-awareness and recovery — not perfection.",star:{S:"What was the situation?",T:"What were you responsible for?",A:"What went wrong and what did you do to fix it?",R:"What did you change as a result?"},tips:["Choose a real but not catastrophic example","Don't over-apologise or over-explain","The 'result' should show growth"],sample:"Early in my career I underestimated the scope of a market sizing exercise (S). I was the lead on it and assumed I had more data than I did (T). I caught the gap the night before the deadline and worked through the night to fill it, but it still went out late (A). I now build in a structured scope check at the start of every project and have never missed a deadline since (R)."},
  {lv:"Advanced",q:"Where do you see yourself in five years?",guide:"Show ambition. Tie your growth to the company's direction. Avoid sounding like you'll leave soon.",star:null,tips:["Research the company's roadmap first","Talk about contribution, not just titles","Make it about growth you can bring them"],sample:"In five years I'd like to be heading a data function — ideally here, given how fast you're scaling your analytics capability. I see the next two years as a time to deepen my domain knowledge in FMCG, build my stakeholder management skills, and take on cross-functional projects. By year three or four, I'd want to be the go-to person for translating commercial questions into data answers."},
  {lv:"Advanced",q:"Why should we hire you over other candidates?",guide:"Be specific, confident, and evidence-based. This is your elevator pitch.",star:null,tips:["Reference the job description","Quantify your impact if possible","This is not the moment for excessive modesty"],sample:"Because I bring something that's hard to find at this level: strong analytical rigour combined with commercial instinct. I built a forecasting model at my current company that cut projection errors by 28%, and I presented it to the CFO in terms that led to a budget decision the same day. I've read your JD carefully — that exact combination of technical depth and business communication is what you're looking for, and it's genuinely what I do best."},
  {lv:"Beginner",q:"Why do you want to work here?",guide:"Show you've done research. Connect their needs to your motivation, not just your needs.",star:null,tips:["Mention something specific about the company","Avoid generic answers like 'good opportunity'","Keep it under 45 seconds"],sample:"I've followed your company's growth in the hearing healthcare space, and I really admire how data-driven your customer experience decisions are. I want to be part of a team where my analytical work directly improves people's lives, and that's exactly what this role offers."},
  {lv:"Beginner",q:"What are your salary expectations?",guide:"Give a realistic range based on research, not a single fixed number.",star:null,tips:["Research market rates beforehand","Give a range, not one number","Stay open to negotiation"],sample:"Based on my research and experience level, I'm looking at a range of 8 to 10 lakhs, but I'm flexible depending on the full compensation package and growth opportunities here."},
  {lv:"Intermediate",q:"Tell me about a time you had to learn something quickly.",guide:"Show adaptability and a clear learning process, not just the outcome.",star:{S:"What was the situation and the new skill needed?",T:"What was your responsibility?",A:"How exactly did you learn it — resources, practice, who helped?",R:"How did it turn out?"},tips:["Pick a genuine example, even a small one","Show your learning process, not just the result","End with how you applied it"],sample:"Our team adopted a new BI tool with two weeks' notice before a client demo (S). I was responsible for migrating our core dashboard (T). I spent evenings on the tool's documentation, built a test dashboard first, and asked a colleague who'd used it before to review my work (A). I delivered the migration a day early and now I'm the go-to person for that tool on our team (R)."},
  {lv:"Intermediate",q:"How do you prioritise when everything feels urgent?",guide:"Show a clear, repeatable method, not just 'I work hard'.",star:null,tips:["Mention a specific framework or method you use","Give a concrete example","Show you communicate priorities to others"],sample:"I usually start by separating what's truly time-sensitive from what feels urgent but isn't. For example, when three deliverables landed on the same day last month, I checked with each stakeholder on their real deadline, found one had flexibility, and communicated a revised plan to everyone within the hour rather than just guessing."},
  {lv:"Advanced",q:"Tell me about a time you disagreed with your manager.",guide:"Show you can disagree respectfully and back it with reasoning, without sounding insubordinate.",star:{S:"What was the disagreement about?",T:"What was at stake, and what was your role?",A:"How did you raise the disagreement?",R:"What was the outcome, regardless of who was 'right'?"},tips:["Never frame your manager negatively","Focus on the reasoning, not the conflict","Show respect for the final decision either way"],sample:"My manager wanted to launch a feature without a beta phase to hit a deadline (S). I was responsible for the rollout plan and was concerned about undetected bugs reaching all customers at once (T). I shared data from a past launch where skipping beta caused a spike in support tickets, and proposed a one-week beta with our most engaged customers instead (A). She agreed to the compromise, the beta caught two real issues, and it's now part of our standard process (R)."},
  {lv:"Advanced",q:"How do you handle ambiguity in a project?",guide:"Senior-level question — show you can create structure where none exists, not just tolerate uncertainty.",star:null,tips:["Give a concrete method for clarifying ambiguity","Show comfort making decisions with incomplete information","Mention how you keep stakeholders aligned along the way"],sample:"When a project arrives without clear requirements, my first move is to write down my assumptions and circulate them for a quick sanity check before doing any real work — it surfaces gaps early and cheaply. I then break the work into smaller milestones so we can course-correct often rather than discovering a mismatch at the very end. That approach turned a vaguely-scoped 'improve retention' brief into a concrete three-month roadmap within the first week."},

  {phrase:"put all cards on the table",meaning:"Be completely honest and open",ex:"Let's put all cards on the table before we negotiate."},
  {phrase:"get the ball rolling",meaning:"Start a process or activity",ex:"Let's get the ball rolling on the new campaign."},

];

// Word match game data
const MATCH_SETS=[
  {title:"Match the phrase to its meaning",pairs:[
    {a:"circle back",b:"return to a topic later"},
    {a:"touch base",b:"make brief contact"},
    {a:"bandwidth",b:"capacity to do work"},
    {a:"wrap up",b:"finish or conclude"},
  ]},
  {title:"Match the email phrase",pairs:[
    {a:"loop in",b:"add to the email thread"},
    {a:"flag",b:"highlight for attention"},
    {a:"escalate",b:"raise to higher authority"},
    {a:"reach out",b:"contact someone"},
  ]},
  {title:"Match the idiom",pairs:[
    {a:"bite the bullet",b:"accept something painful"},
    {a:"low-hanging fruit",b:"easy wins"},
    {a:"move the needle",b:"make a real difference"},
    {a:"game changer",b:"fundamentally changes things"},
  ]},
];
// Unlimited match sets — built live from the full vocab + idiom pools, reshuffled on demand
function genMatchSets(count=6){
  const rng=bucketRng("match-gen");
  const allWordPairs=Object.values(VOCAB_DATA).flat().map(v=>({a:v.w,b:v.m}));
  const allIdiomPairs=IDIOMS.map(id=>({a:id.phrase,b:id.meaning}));
  const allPairs=shuffled(rng,[...allWordPairs,...allIdiomPairs]);
  const sets=[];
  for(let i=0;i<count;i++){
    const chunk=allPairs.slice(i*4,i*4+4);
    if(chunk.length<4) break;
    sets.push({title:`Match set ${i+1} — workplace vocabulary`,pairs:chunk});
  }
  return sets.length?sets:MATCH_SETS;
}
// Unlimited scramble word pool — drawn from vocabulary + a curated business-word list
const SCRAMBLE_WORDS=["schedule","feedback","proposal","deadline","stakeholder","escalate","negotiate","benchmark","onboarding","bandwidth","deliverable","workflow","turnaround","milestone","procurement","compliance","leverage","priority","alignment","initiative"];


// Fill in the blank sentences — sourced from the expandable FILL_BANK (genFillSet) for unlimited variety
const FILL_SENTENCES=[...FILL_BANK.Beginner,...FILL_BANK.Intermediate,...FILL_BANK.Advanced].map((f,i)=>({lv:Object.keys(FILL_BANK).find(lv=>FILL_BANK[lv].includes(f)),...f}));

function matchGame(){
  const allSets=genMatchSets(8);
  const setData=allSets[(S.matchSetIdx||0)%allSets.length];
  const allPairs=setData.pairs;
  const words=allPairs.map(p=>p.a);
  const defs=allPairs.map(p=>p.b);
  const tileOrder=[...words,...defs].sort(()=>Math.random()-0.5);
  if(!window._matchState||window._matchState.set!==S.matchSetIdx){
    window._matchState={set:S.matchSetIdx||0,tiles:tileOrder,selected:[],matched:[]};
  }
  const ms=window._matchState;
  const allMatched=ms.matched.length===allPairs.length*2;
  return `
  <div class="card">
    <span class="tag violet">Word Match — Set ${(S.matchSetIdx||0)+1}/${allSets.length} <span style="color:var(--text3);">· unlimited, reshuffles daily</span></span>
    <h3 style="font-family:var(--font);font-size:1rem;margin-bottom:14px;">${setData.title}</h3>
    <div class="match-board" id="matchBoard">
      ${ms.tiles.map((t,i)=>{
        const isSel=ms.selected.includes(i);
        const isMatch=ms.matched.includes(i);
        return `<button class="match-tile ${isMatch?'matched':''} ${isSel?'selected':''}" data-match-idx="${i}" ${isMatch?'disabled':''}>${t}</button>`;
      }).join("")}
    </div>
    ${allMatched?`<div class="fb good show" style="margin-top:14px;">🎉 All matched! Set ${(S.matchSetIdx||0)+1} complete!</div>`:''}
    <div class="btn-row mt-sm">
      ${allMatched?`<button class="btn violet" data-next-match="1">Next set →</button>`:''}
      <button class="btn ghost sm" onclick="window._matchState=null;S.matchSetIdx=(S.matchSetIdx||0);render();">Reset</button>
      ${refreshBtn("match-gen","🎲 Shuffle all sets")}
    </div>
  </div>`;
}

function scrambleGame(){
  const wordList=SCRAMBLE_WORDS;
  if(!window._scramble){
    const w=wordList[Math.floor(Math.random()*wordList.length)];
    window._scramble={word:w,letters:[...w].sort(()=>Math.random()-0.5),answer:[],solved:false};
  }
  const sc=window._scramble;
  return `

function typeGame(){
  const items=genTypeSet(S.level,8);
  if(!window._typeState||window._typeState.level!==S.level){
    window._typeState={level:S.level,idx:0,typed:"",started:false,startTime:0,done:false,wpm:0};
  }
  const ts=window._typeState;
  const sentence=items[ts.idx]||items[0];
  const target=sentence.text;
  const chars=target.split("").map((c,i)=>{
    const typed=ts.typed[i];
    let cls="type-char ";
    if(typed==null) cls+=i===ts.typed.length?"current":"pending";
    else cls+=typed===c?"correct":"wrong";
    return `<span class="${cls}">${c}</span>`;
  }).join("");
  return `
  <div class="card">
    <span class="tag sky">Typing Challenge — accuracy & speed <span style="color:var(--text3);">· fresh sentences daily</span></span>
    ${ts.done?`<div class="fb good show">🎯 Done! Speed: <b>${ts.wpm} WPM</b> · Try the next sentence.</div>`:''}
    <div class="type-display">${chars}</div>
    <textarea id="typeInput" placeholder="Start typing the sentence above…" rows="2" style="margin-top:10px;" ${ts.done?'disabled':''}>${ts.typed}</textarea>
    <div class="btn-row mt-sm">
      <span class="small">${ts.typed.length}/${target.length} chars · ${ts.wpm||0} WPM</span>
      <span class="spacer"></span>
      <button class="btn ghost sm" onclick="window._typeState=null;render();">Reset</button>
      ${ts.done?`<button class="btn amber" onclick="window._typeState.idx=(window._typeState.idx+1)%${items.length};window._typeState.typed='';window._typeState.done=false;window._typeState.started=false;render();">Next sentence</button>`:''}
      ${refreshBtn("type-"+S.level,"🎲 New batch")}
    </div>
  </div>`;
}


const GRAMMAR_TRAPS=[
  {
    title:"Which sentence is grammatically correct?",
    cards:[
      {txt:"I have worked here since three years.",correct:false,why:"Use 'for' with durations, not 'since'. Say: 'for three years'"},
      {txt:"She has been waiting since 9 AM.",correct:true,why:"Correct! 'Since' + specific time point."},
      {txt:"We met the client since Monday.",correct:false,why:"'Since' needs present perfect: 'We have met the client since Monday' or 'We met the client on Monday'"},
    ],
  },
  {
    title:"Which is the most professional response?",
    cards:[
      {txt:"I'll revert back to you.",correct:false,why:"'Revert back' is redundant — 'revert' already means 'go back'. Also, 'revert' as 'reply' is Indian English — say 'I'll get back to you'."},
      {txt:"Let me get back to you by EOD.",correct:true,why:"Clear, professional, and globally understood."},
      {txt:"I'll come back to you when I know.",correct:false,why:"Not wrong, but vague. 'By EOD' or a specific time is much stronger."},
    ],
  },
  {
    title:"Spot the incorrect usage:",
    cards:[
      {txt:"Please do the needful.",correct:false,why:"Classic Indian English phrase — not used in global business. Say: 'Please take care of this' or 'Please proceed accordingly'."},
      {txt:"Please proceed as discussed.",correct:true,why:"Natural and universally understood."},
      {txt:"Let me know if you need anything further.",correct:true,why:"Polite, professional standard email closing."},
    ],
  },
  {
    title:"Which sentence uses the correct preposition?",
    cards:[
      {txt:"The report is pending since two days.",correct:false,why:"Use 'for' with a duration: 'pending for two days'. 'Since' needs a specific starting point like 'since Monday'."},
      {txt:"The report has been pending for two days.",correct:true,why:"Correct — 'for' + duration, with present perfect."},
      {txt:"I will revert you shortly.",correct:false,why:"'Revert' is intransitive — you can't 'revert someone'. Say 'I will revert to you' or better, 'I'll get back to you'."},
    ],
  },
  {
    title:"Which version sounds most natural to a global audience?",
    cards:[
      {txt:"Kindly do one thing, send the file.",correct:false,why:"'Kindly do one thing' is a direct translation pattern from Indian languages — not natural in global business English. Say 'Could you please send the file?'"},
      {txt:"Could you please send the file?",correct:true,why:"Clear, polite, and standard in any English-speaking business context."},
      {txt:"Please find the same attached.",correct:false,why:"'The same' as a stand-in noun is dated/formal Indian English. Say 'Please find it attached' or name the document directly."},
    ],
  },
  {
    title:"Which sentence correctly uses the passive voice?",
    cards:[
      {txt:"The decision was took by the board.",correct:false,why:"Incorrect past participle — it should be 'taken', not 'took'. Correct: 'The decision was taken by the board.'"},
      {txt:"The proposal was reviewed by three teams.",correct:true,why:"Correct passive structure: was + past participle + by + agent."},
      {txt:"The budget is approving next week.",correct:false,why:"This needs the passive 'is being approved' or future 'will be approved', not the active-looking '-ing' form here."},
    ],
  },
];

/* ============================================================
   EVENT BINDING
============================================================ */
function bind(){
  // Navigation
  document.querySelectorAll(".bnav-btn[data-tab]").forEach(b=>b.addEventListener("click",()=>goTab(b.dataset.tab)));
  document.querySelectorAll("[data-goto]").forEach(b=>b.addEventListener("click",()=>goTab(b.dataset.goto)));

  // Level
  document.querySelectorAll("[data-lv]").forEach(b=>b.addEventListener("click",()=>{ S.level=b.dataset.lv; render(); }));

  // Voice toggle
  document.getElementById("voiceChip")?.addEventListener("click",()=>{ voiceGender=voiceGender==="girl"?"guy":"girl"; render(); });

  // Play buttons
  document.querySelectorAll("[data-play]").forEach(b=>b.addEventListener("click",()=>speak(b.dataset.play,parseFloat(b.dataset.rate||0.88))));

  // Quiz opts
  document.querySelectorAll(".quiz-opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const parent=btn.closest(".quiz-opts");
      if(parent.dataset.answered) return;
      parent.dataset.answered="1";
      const correct=parseInt(btn.dataset.correct);
      parent.querySelectorAll(".quiz-opt").forEach((o,i)=>{
        o.classList.add(i===correct?"correct":"wrong");
        o.disabled=true;
      });
    });
  });

  // Done buttons
  document.querySelectorAll("[data-done]").forEach(b=>{
    b.addEventListener("click",()=>{ markDone(b.dataset.done,parseInt(b.dataset.pts||10)); render(); });
  });

  // Toggle show/hide
  document.querySelectorAll("[data-toggle]").forEach(b=>{
    b.addEventListener("click",()=>{
      const el=document.getElementById(b.dataset.toggle);
      if(el){ el.style.display=el.style.display==="none"?"block":"none"; el.classList.toggle("show"); }
    });
  });

  // Dictation check
  document.querySelectorAll("[data-check-dict]").forEach(b=>{
    b.addEventListener("click",()=>{
      const card=b.closest(".card");
      const input=card.querySelector("[data-dict-input]");
      const answers=b.dataset.checkDict.split("|").map(a=>a.toLowerCase());
      const typed=input.value.toLowerCase().split(",").map(s=>s.trim()).filter(Boolean);
      let correct=0;
      answers.forEach(a=>{ if(typed.includes(a)) correct++; });
      const fb=card.querySelector("[data-dict-fb]");
      fb.className=`fb show ${correct===answers.length?"good":correct>0?"neutral":"bad"}`;
      fb.innerHTML=`You got <b>${correct}/${answers.length}</b> correct. Answers: <em>${answers.join(", ")}</em>`;
    });
  });

  // Word count for textareas
  document.querySelectorAll("[data-write-area]").forEach(ta=>{
    ta.addEventListener("input",()=>{
      const wc=ta.parentElement.querySelector("[data-word-count]")||ta.nextElementSibling;
      if(wc) wc.textContent=ta.value.trim().split(/\s+/).filter(Boolean).length+" words";
    });
  });

  // Flashcard
  document.querySelectorAll("[data-deck]").forEach(b=>b.addEventListener("click",()=>{ S.flashDeck=b.dataset.deck; S.flashIdx=0; render(); }));
  document.getElementById("flashScene")?.addEventListener("click",()=>{ document.getElementById("flashInner")?.classList.toggle("flipped"); });
  document.querySelector("[data-flash='next']")?.addEventListener("click",()=>{ S.flashIdx=(S.flashIdx+1)%VOCAB_DATA[S.flashDeck].length; render(); });
  document.querySelector("[data-flash='prev']")?.addEventListener("click",()=>{ S.flashIdx=(S.flashIdx-1+VOCAB_DATA[S.flashDeck].length)%VOCAB_DATA[S.flashDeck].length; render(); });
  document.querySelector("[data-flash='know']")?.addEventListener("click",()=>{
    const k=S.flashDeck+":"+S.flashIdx;
    if(!S.vocabKnown[k]){ S.vocabKnown[k]=true; addPts(5); save(); }
    S.flashIdx=(S.flashIdx+1)%VOCAB_DATA[S.flashDeck].length; render();
  });

  // Grammar topic
  document.querySelectorAll("[data-gram-topic]").forEach(b=>b.addEventListener("click",()=>{ S.gramTopic=b.dataset.gramTopic; render(); }));

  // Grammar grade
  document.querySelectorAll("[data-grade-gram]").forEach(b=>{
    b.addEventListener("click",()=>{
      const total=parseInt(b.dataset.gramTotal);
      let correct=0;
      document.querySelectorAll(`[data-quiz^="gram-"]`).forEach(group=>{
        if(group.querySelector(".quiz-opts")?.dataset.answered){
          if(group.querySelector(".quiz-opt.correct")) correct++;
        }
      });
      const fb=document.querySelector("[data-gram-fb]");
      if(fb){
        fb.className=`fb show ${correct===total?"good":correct>0?"neutral":"bad"}`;
        fb.innerHTML=`Score: <b>${correct}/${total}</b> ${correct===total?"— excellent! 🎉":"— review the examples and try again."}`;
      }
      if(correct>0) addPts(correct*3);
    });
  });

  // Game tabs
  document.querySelectorAll("[data-game-tab]").forEach(b=>b.addEventListener("click",()=>{ S.gameTab=b.dataset.gameTab; render(); }));

  // Word match
  document.querySelectorAll(".match-tile[data-match-idx]").forEach(tile=>{
    tile.addEventListener("click",()=>{
      const ms=window._matchState;
      if(!ms||tile.classList.contains("matched")) return;
      const idx=parseInt(tile.dataset.matchIdx);
      if(ms.selected.includes(idx)){ ms.selected=[]; document.querySelectorAll(".match-tile").forEach(t=>t.classList.remove("selected")); return; }
      ms.selected.push(idx);
      tile.classList.add("selected");
      if(ms.selected.length===2){
        const [a,b]=ms.selected;
        const ta=ms.tiles[a], tb=ms.tiles[b];
        const allSets=genMatchSets(8);
        const set=allSets[(ms.set||0)%allSets.length];
        const isMatch=set.pairs.some(p=>(p.a===ta&&p.b===tb)||(p.b===ta&&p.a===tb));
        if(isMatch){
          ms.matched.push(a,b);
          document.querySelectorAll(".match-tile").forEach(t=>{ if([a,b].includes(parseInt(t.dataset.matchIdx))) t.classList.add("matched"); });
          addPts(5);
        } else {
          document.querySelectorAll(".match-tile").forEach(t=>{ if(ms.selected.includes(parseInt(t.dataset.matchIdx))) t.classList.add("wrong-flash"); });
          setTimeout(()=>{ document.querySelectorAll(".match-tile").forEach(t=>t.classList.remove("wrong-flash","selected")); },400);
        }
        ms.selected=[];
        if(ms.matched.length===set.pairs.length*2){ addPts(10); setTimeout(()=>render(),300); }
      }
    });
  });
  document.querySelector("[data-next-match]")?.addEventListener("click",()=>{ S.matchSetIdx=((S.matchSetIdx||0)+1)%genMatchSets(8).length; window._matchState=null; render(); });


  // Scramble
  document.querySelectorAll("[data-scram-pick]").forEach(l=>{
    l.addEventListener("click",()=>{
      const sc=window._scramble;
      if(!sc||sc.solved) return;
      const i=parseInt(l.dataset.scramPick);
      if(sc.answer.includes(i)) return;
      sc.answer.push(i);
      render();
    });
  });
  document.querySelectorAll("[data-scram-clear]").forEach(s=>{
    s.addEventListener("click",()=>{
      const sc=window._scramble;
      if(!sc||sc.solved) return;
      const i=parseInt(s.dataset.scramClear);
      if(sc.answer[i]!=null){ sc.answer.splice(i,1); render(); }
    });
  });
  document.getElementById("checkScramble")?.addEventListener("click",()=>{
    const sc=window._scramble;
    if(!sc) return;
    const typed=sc.answer.map(i=>sc.letters[i]).join("");
    if(typed===sc.word){ sc.solved=true; addPts(15); render(); }
    else{
      const el=document.getElementById("checkScramble");
      el.textContent="❌ Try again!"; el.className="btn coral sm";
      setTimeout(()=>{ el.textContent="Check"; el.className="btn amber"; },800);
    }
  });

  // Typing
  document.getElementById("typeInput")?.addEventListener("input",(e)=>{
    const ts=window._typeState;
    if(!ts) return;
    const items=genTypeSet(S.level,8);
    const target=(items[ts.idx]||items[0]).text;
    if(!ts.started){ ts.started=true; ts.startTime=Date.now(); }
    ts.typed=e.target.value.slice(0,target.length);
    if(ts.typed===target){
      ts.done=true;
      const elapsed=(Date.now()-ts.startTime)/1000/60;
      ts.wpm=Math.round((target.split(" ").length)/elapsed);
      addPts(20);
    }
    render();
    setTimeout(()=>{ const inp=document.getElementById("typeInput"); if(inp){ inp.value=ts.typed; inp.focus(); inp.setSelectionRange(ts.typed.length,ts.typed.length); }},10);
  });

  // True/Lie
  document.querySelectorAll("[data-tl-idx]").forEach(card=>{
    card.addEventListener("click",()=>{
      const i=parseInt(card.dataset.tlIdx);
      const correct=card.dataset.tlCorrect==="true";
      const why=(GRAMMAR_TRAPS[S.trueLieSet||0].cards[i]||{}).why||"";
      card.classList.add(correct?"truth-revealed":"lie-revealed");
      const fb=document.getElementById(`tl-fb-${i}`);
      if(fb){ fb.style.display="block"; fb.innerHTML=`${correct?"✅":"❌"} ${why}`; fb.style.color=correct?"var(--green)":"var(--coral)"; }
    });
  });

  // Idiom flip
  document.querySelectorAll("[data-idiom-flip]").forEach(el=>{
    el.addEventListener("click",()=>{ const i=el.dataset.idiomFlip; S.idiomFlips[i]=!S.idiomFlips[i]; render(); });
  });

  // Scenario
  document.querySelectorAll("[data-scenario]").forEach(b=>b.addEventListener("click",()=>{ S.scenarioId=b.dataset.scenario; render(); }));

  // Fill answer
  document.querySelectorAll("[data-fill-answer]").forEach(b=>{
    b.addEventListener("click",()=>{
      const correct=b.dataset.fillCorrect;
      const chosen=b.dataset.fillAnswer;
      const key=b.dataset.fillKey;
      const fb=document.querySelector(`[data-fill-fb="${key}"]`);
      if(chosen===correct){
        fb.className="fb good show"; fb.textContent=`✅ Correct! "${correct}" is the right answer.`;
        markDone(key,8);
        b.closest(".card").querySelectorAll("[data-fill-answer]").forEach(btn=>btn.disabled=true);
      } else {
        fb.className="fb bad show"; fb.textContent=`❌ Not quite. Try again!`;
        b.style.opacity="0.4"; b.disabled=true;
      }
    });
  });

  // Record
  document.querySelectorAll("[data-record]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const target=btn.dataset.record;
      const key=btn.dataset.key;
      const card=btn.closest(".card");
      const fb=card.querySelector(`[data-speak-fb]`);
      const ringId=btn.dataset.ringId||("micRing-"+Array.from(document.querySelectorAll("[data-record]")).indexOf(btn));
      const ring=document.getElementById(ringId)||card.querySelector(".mic-ring");
      startRecord(target,key,fb,ring);
    });
  });
}

function startRecord(target,key,fb,ring){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ if(fb){fb.className="fb info show";fb.textContent="Speech recognition not available. Say the phrase aloud, listen carefully, then mark done.";} return; }
  try{
    const r=new SR();
    r.lang="en-IN"; r.interimResults=false; r.maxAlternatives=1;
    if(ring) ring.classList.add("listening");
    r.onresult=e=>{
      const said=e.results[0][0].transcript;
      const score=matchScore(target,said);
      if(fb){
        fb.className=`fb show ${score>=70?"good":score>=40?"neutral":"bad"}`;
        fb.innerHTML=`You said: "<em>${esc2(said)}</em>" · Match: <b>${score}%</b> ${score>=70?"— great! 🎉":score>=40?"— good, try once more.":"— listen again and focus on word stress."}`;
      }
      if(score>=60) markDone(key,10);
      if(ring) ring.classList.remove("listening");
    };
    r.onerror=()=>{ if(ring) ring.classList.remove("listening"); };
    r.onend=()=>{ if(ring) ring.classList.remove("listening"); };
    r.start();
  }catch(e){ if(fb){fb.className="fb bad show";fb.textContent="Microphone access denied. Allow it in your browser settings.";} }
}
function matchScore(a,b){
  const n=s=>s.toLowerCase().replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(Boolean);
  const at=n(a),bt=n(b); let m=0; const bc=[...bt];
  at.forEach(w=>{ const i=bc.indexOf(w); if(i>-1){m++;bc.splice(i,1);} });
  return at.length?Math.round(m/at.length*100):0;
}

/* ============================================================
   INIT
============================================================ */
loadState();
</script>
